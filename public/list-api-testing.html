<script>
const tools = [
  {
    name: "Postman",
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12A10 10 0 0 0 12 2v10l8.66 5A10 10 0 0 0 22 12z"></path><path d="M12 2v10L3.34 17A10 10 0 0 1 12 2z"></path><path d="M12 22a10 10 0 0 0 8.66-5L12 12v10z"></path></svg>',
    rating: 4.5,
    tag: "Enterprise Standard",
    desc: "The industry standard for API development. Offers a comprehensive suite of tools for designing, mocking, testing, and documenting APIs.",
    features: ["Extensive Collaboration", "Automated Testing", "API Mocking", "Rich Ecosystem"],
    pros: ["Feature-rich", "Huge community", "Excellent documentation"],
    cons: ["Resource heavy", "Cloud sync required for teams", "Complex UI"]
  },
  {
    name: "Insomnia",
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>',
    rating: 4.8,
    tag: "Developer Favorite",
    desc: "A lightweight, open-source desktop application for API design and testing with native support for GraphQL, REST, and gRPC.",
    features: ["GraphQL Support", "Environment Variables", "Code Snippet Generation", "Plugin System"],
    pros: ["Clean, intuitive UI", "Fast performance", "Local-first option"],
    cons: ["Fewer enterprise features", "Smaller community vs Postman"]
  },
  {
    name: "Hoppscotch",
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>',
    rating: 4.6,
    tag: "Web-Based",
    desc: "A fast, open-source API development ecosystem accessible directly from your browser. No installation required.",
    features: ["Real-time Collaboration", "WebSockets/GraphQL/MQTT", "PWA Support", "Customizable UI"],
    pros: ["Zero installation", "Blazing fast", "Open source"],
    cons: ["Browser extension needed for CORS", "Limited offline capabilities"]
  },
  {

    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>',
    rating: 4.7,
    tag: "VS Code Extension",
    desc: "A lightweight REST API Client Extension for Visual Studio Code. Test APIs without leaving your editor.",
    features: ["VS Code Integration", "Scriptless Testing", "Environment Variables", "Git Syncing"],
    pros: ["No context switching", "Very lightweight", "Saves to workspace"],
    cons: ["Tied to VS Code", "Fewer advanced scripting features"]
  },
  {
    name: "cURL",
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>',

    tag: "CLI Tool",
    desc: "The ubiquitous command-line tool for transferring data with URLs. Essential for quick tests and scripting.",
    features: ["Universal Availability", "Countless Protocols", "Scriptable", "Extremely Fast"],
    pros: ["Installed everywhere", "Zero overhead", "Perfect for CI/CD"],
    cons: ["Steep learning curve", "No GUI", "Hard to manage complex requests"]

];

const seoData = [
  {
    title: "Why Use Dedicated API Testing Tools?",
    content: "API testing tools are essential for modern software development. They allow developers to construct complex HTTP requests, manage authentication tokens, and validate responses without writing disposable scripts or building throwaway frontends. A good tool saves countless hours by letting you save parameterized requests into collections, share them with your team, and run automated assertion tests against your endpoints."
  },
  {
    title: "Key Features to Look For",
    content: "When evaluating a free API client, prioritize features that match your workflow. If you work heavily with complex architectures, ensure the tool supports GraphQL or gRPC alongside standard REST. Environment variable management is crucial for switching between local, staging, and production servers seamlessly. Additionally, look for built-in code snippet generators (to convert a request into curl or JS fetch) and robust scripting capabilities for writing post-request tests."
  },
  {
    title: "Desktop App vs. Web Client vs. Editor Extension",
    content: "The landscape of API testing has evolved. Traditional heavy desktop apps like Postman provide massive ecosystems but can be resource-intensive. Web-based alternatives like Hoppscotch offer instant access and zero installation but often require browser extensions to bypass CORS restrictions. Editor extensions like Thunder Client are increasingly popular because they eliminate context switching—you can test your API right next to your source code."
  }
];

function generateStars(rating) {
  const fullStars = Math.floor(rating);
  const hasHalfStar = rating % 1 !== 0;
  let starsHtml = '';

  for (let i = 0; i < 5; i++) {
    if (i < fullStars) {
      starsHtml += '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>';
    } else if (i === fullStars && hasHalfStar) {
      // Simple half star representation using clipping or viewbox trick (fallback to full for simplicity here, but visual styling applies)
      starsHtml += '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>';
    } else {
      starsHtml += '<svg class="empty" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>';
    }
  }
  return starsHtml;
}

function renderTools() {

    <div class="tool-card">

        <div>
          <h3 class="card-title">${tool.icon} ${tool.name}</h3>
          <div class="rating" title="${tool.rating} out of 5 stars">
            ${generateStars(tool.rating)}
          </div>
        </div>
      </div>
      <div class="card-body">
        <p class="card-desc">${tool.desc}</p>

        <div>
          <ul class="feature-list">
            ${tool.features.map(f => `
              <li>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                ${f}
              </li>
            `).join('')}
          </ul>
        </div>

        <div class="pros-cons">
          <div class="pc-col pros">
            <h4><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg> Pros</h4>
            <ul class="pc-list">
              ${tool.pros.map(p => `<li>${p}</li>`).join('')}
            </ul>
          </div>
          <div class="pc-col cons">
            <h4><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="8" y1="12" x2="16" y2="12"></line></svg> Cons</h4>
            <ul class="pc-list">
              ${tool.cons.map(c => `<li>${c}</li>`).join('')}
            </ul>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <span class="tag">${tool.tag}</span>
      </div>
    </div>
  `).join('');
}

function renderSEO() {
  const section = document.getElementById('seoSection');
  section.innerHTML = seoData.map(item => `
    <h2>${item.title}</h2>
    <p>${item.content}</p>
  `).join('');
}

  renderTools();

</script>
