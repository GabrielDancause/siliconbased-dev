<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-G86C7NJG3F"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-G86C7NJG3F');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Original Research & Studies | siliconbased.dev</title>
<meta name="description" content="Original research studies with real data. Security headers, page weight, CSS frameworks, API benchmarks, and more.">
<link rel="canonical" href="https://siliconbased.dev/studies/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#060a12;color:#c8d0de;line-height:1.6}
.hero{text-align:center;padding:80px 24px 50px;background:linear-gradient(180deg,#0f1729,#060a12);position:relative}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 40% 30%,rgba(129,140,248,0.06),transparent 60%)}
.hero-content{position:relative;z-index:1}
.hero .tag{display:inline-block;background:rgba(129,140,248,0.1);color:#818cf8;font-size:0.7rem;font-weight:800;padding:6px 16px;border-radius:20px;letter-spacing:1px;margin-bottom:12px}
.hero h1{font-size:2.6rem;font-weight:900;letter-spacing:-1px;margin-bottom:12px;background:linear-gradient(135deg,#fff,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:#5a6a80;font-size:1rem;max-width:500px;margin:0 auto}
.container{max-width:1200px;margin:0 auto;padding:40px 24px 80px}
.count{text-align:center;color:#5a6a80;font-size:0.85rem;margin-bottom:32px}.count span{color:#818cf8;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px}
.card{background:linear-gradient(135deg,#0a1020,#0d1428);border:1px solid #1a2332;border-radius:16px;padding:28px 24px;text-decoration:none;color:inherit;display:block;transition:all 0.3s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#818cf8,#6366f1);opacity:0;transition:opacity 0.3s}
.card:hover{border-color:#818cf8;transform:translateY(-3px);box-shadow:0 12px 40px rgba(129,140,248,0.15)}
.card:hover::before{opacity:1}
.card-emoji{font-size:1.6rem;margin-bottom:12px;display:block}
.card-stat{margin-bottom:16px}
.stat-number{display:block;font-size:2rem;font-weight:900;color:#818cf8;line-height:1;letter-spacing:-1px}
.stat-label{display:block;font-size:0.75rem;color:#5a6a80;margin-top:4px}
.card-name{font-size:1rem;font-weight:800;color:#e0e8f0;margin-bottom:8px;line-height:1.3}
.card-desc{font-size:0.85rem;color:#6a7a90;line-height:1.4}
.footer{text-align:center;padding:50px 24px;font-size:0.85rem;color:#3a4a5a;border-top:1px solid #151f2e;background:#040810}
.footer a{color:#818cf8;text-decoration:none}
@media(max-width:768px){.hero h1{font-size:2rem}.hero{padding:60px 20px 40px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<script src="/nav.js"></script>
<div class="hero">
  <div class="hero-content">
    <span class="tag">🔬 RESEARCH</span>
    <h1>Original Studies</h1>
    <p>Real data nobody else has packaged. Crawled, measured, analyzed.</p>
  </div>
</div>
<div class="container">
  <div class="count"><span id="shown">0</span> studies</div>
  <div class="grid" id="grid"></div>
</div>
<div class="footer">© 2026 <a href="/">siliconbased.dev</a> · A <a href="https://gab.ae">GAB Ventures</a> property</div>
<script>
const studies = [
  { emoji: "📊", name: "API Response Time Benchmark 2026", slug: "/api-response-times", desc: "We measured the response times of 30 popular public APIs. Hacker News was the fastest at 18ms, while the overall average was 172ms.", stat: "18ms", statLabel: "Fastest API Avg" },
  { emoji: "🔬", name: "Cloud Hosting Price Comparison 2026", slug: "/hosting-pricing", desc: "We analyzed the pricing models of major cloud hosting platforms for static sites and serverless.", stat: "10", statLabel: "Platforms Analyzed" },
  { emoji: "🔒", name: "HTTP Security Headers Study 2026", slug: "/security-headers-study", desc: "85 top websites analyzed for 10 critical HTTP security headers", stat: "Only 13%", statLabel: "score an A grade" },
  { emoji: "🎨", name: "CSS Framework File Size Comparison", slug: "/css-framework-sizes", desc: "30 frameworks measured — Bootstrap to Bulma file size analysis", stat: "30", statLabel: "frameworks compared" },
  { emoji: "⚖️", name: "Web Page Weight Study 2026", slug: "/page-weight-study", desc: "Full resource breakdown of 100 top websites", stat: "2.2 MB", statLabel: "average page weight" },
  { emoji: "📦", name: "JavaScript Framework Bundle Size Comparison 2026", slug: "/js-framework-sizes", desc: "Analyzed 8 modern JavaScript frameworks. Compared minified sizes, GitHub stars, and npm downloads.", stat: "7.42KB", statLabel: "Smallest Core" }
];

const grid = document.getElementById('grid');
const shown = document.getElementById('shown');
shown.textContent = studies.length;
studies.forEach(s => {
  const a = document.createElement('a');
  a.className = 'card';
  a.href = s.slug;
  a.innerHTML = `<span class="card-emoji">${s.emoji}</span><div class="card-stat"><span class="stat-number">${s.stat}</span><span class="stat-label">${s.statLabel}</span></div><h3 class="card-name">${s.name}</h3><p class="card-desc">${s.desc}</p>`;
  grid.appendChild(a);
});
</script>
</body>
</html>
